<div class="toast-container position-fixed bottom-0 end-0 p-3">
</div>

<script>
    function initToasts() {
        const toastContainer = document.querySelector('.toast-container');

        window.showToast = function(message, type = 'info', delay = 5000) {
            const toastId = 'toast-' + Date.now();
            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center text-white bg-${type} border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="${delay}">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `;
            toastContainer.insertAdjacentHTML('beforeend', toastHtml);
            const toastEl = document.getElementById(toastId);
            try {
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
                toastEl.addEventListener('hidden.bs.toast', function () {
                    toastEl.remove();
                });
            } catch(e) {
                // Bootstrap not available - show simple alert style
                toastEl.style.cssText = 'display:block;opacity:1;';
                setTimeout(() => toastEl.remove(), delay);
            }
        };

        const flashedMessages = JSON.parse('{{ get_flashed_messages(with_categories=true) | tojson | safe }}');
        flashedMessages.forEach(function(categoryMessage) {
            const category = categoryMessage[0];
            const message = categoryMessage[1];
            let type = 'info';
            if (category === 'success') type = 'success';
            else if (category === 'error') type = 'danger';
            else if (category === 'warning') type = 'warning';
            showToast(message, type);
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initToasts);
    } else {
        // DOMContentLoaded already fired - wait for scripts
        window.addEventListener('load', initToasts);
    }
</script>
